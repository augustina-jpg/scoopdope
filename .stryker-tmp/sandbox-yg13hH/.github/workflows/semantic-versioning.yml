name: Semantic Versioning & Docker Tags

on:
  workflow_run:
    workflows: [Release]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  docker-semantic-tags:
    name: Tag Docker Images with Semantic Versions
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get latest release version
        id: version
        run: |
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "version=${VERSION#v}" >> $GITHUB_OUTPUT
          echo "tag_name=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.version.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.version.outputs.version }}
            type=semver,pattern={{major}},value=${{ steps.version.outputs.version }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/frontend:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository }}/frontend:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  changelog-validation:
    name: Validate CHANGELOG.md
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check CHANGELOG.md exists
        run: |
          if [ ! -f CHANGELOG.md ]; then
            echo "CHANGELOG.md not found"
            exit 1
          fi
          echo "CHANGELOG.md found and validated"

      - name: Validate CHANGELOG format
        run: |
          if ! head -1 CHANGELOG.md | grep -q "^# Changelog"; then
            echo "CHANGELOG.md must start with '# Changelog'"
            exit 1
          fi
          echo "CHANGELOG.md format is valid"
