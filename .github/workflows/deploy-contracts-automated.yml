name: Deploy Contracts to Testnet

on:
  push:
    branches: [main]
    paths:
      - 'contracts/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'scripts/build.sh'
      - 'scripts/deploy.sh'
      - '.github/workflows/deploy-contracts-automated.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/contracts

jobs:
  detect-changed:
    name: Detect Changed Contracts
    runs-on: ubuntu-latest
    outputs:
      contracts: ${{ steps.changed.outputs.contracts }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed contracts
        id: changed
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'contracts/*/' | grep -oP '^contracts/\K[^/]+' | sort -u | jq -R -s -c 'split("\n")[:-1]')
          if [ "$CHANGED" = "[]" ] || [ -z "$CHANGED" ]; then
            echo "contracts=[]" >> $GITHUB_OUTPUT
          else
            echo "contracts=$CHANGED" >> $GITHUB_OUTPUT
            echo "Changed contracts: $CHANGED"
          fi

  build:
    name: Build Smart Contracts
    runs-on: ubuntu-latest
    needs: detect-changed
    if: needs.detect-changed.outputs.contracts != '[]'

    outputs:
      build-matrix: ${{ steps.matrix.outputs.contracts }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build all contracts
        run: ./scripts/build.sh

      - name: Set build matrix
        id: matrix
        run: |
          CONTRACTS='${{ needs.detect-changed.outputs.contracts }}'
          echo "contracts=$CONTRACTS" >> $GITHUB_OUTPUT

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-builds
          path: target/wasm32-unknown-unknown/release/*.wasm
          retention-days: 3

  deploy-testnet:
    name: Deploy to Stellar Testnet
    runs-on: ubuntu-latest
    needs: [detect-changed, build]
    if: needs.detect-changed.outputs.contracts != '[]'
    strategy:
      matrix:
        contract: ${{ fromJson(needs.build.outputs.build-matrix) }}
      max-parallel: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install Stellar CLI
        run: |
          curl -sSL https://github.com/stellar/stellar-cli/releases/download/v21.5.0/stellar-cli-21.5.0-x86_64-unknown-linux-gnu.tar.gz | tar xz
          sudo mv stellar /usr/local/bin/

      - name: Download WASM artifacts
        uses: actions/download-artifact@v4
        with:
          name: wasm-builds
          path: target/wasm32-unknown-unknown/release/

      - name: Deploy ${{ matrix.contract }} to testnet
        id: deploy
        run: |
          WASM_FILE="target/wasm32-unknown-unknown/release/brain_storm_${{ matrix.contract }}.wasm"

          if [ ! -f "$WASM_FILE" ]; then
            echo "WASM file not found: $WASM_FILE"
            exit 1
          fi

          echo "Deploying ${{ matrix.contract }} to testnet..."

          CONTRACT_ID=$(stellar contract deploy \
            --wasm "$WASM_FILE" \
            --source "${{ secrets.STELLAR_SECRET_KEY }}" \
            --network testnet 2>&1 | grep -oP '(?<=Contract ID: )[A-Z0-9]+' || echo "")

          if [ -z "$CONTRACT_ID" ]; then
            echo "Deployment failed for ${{ matrix.contract }}"
            exit 1
          fi

          echo "contract_id=$CONTRACT_ID" >> $GITHUB_OUTPUT
          echo "Deployed ${{ matrix.contract }}: $CONTRACT_ID"
        env:
          STELLAR_SECRET_KEY: ${{ secrets.STELLAR_SECRET_KEY }}

      - name: Verify deployment
        run: |
          echo "Verifying deployment of ${{ matrix.contract }}..."
          stellar contract info \
            --id "${{ steps.deploy.outputs.contract_id }}" \
            --network testnet || echo "Verification warning"

      - name: Store contract ID
        run: |
          mkdir -p deployment-artifacts
          echo "${{ steps.deploy.outputs.contract_id }}" > "deployment-artifacts/${{ matrix.contract }}-testnet.txt"

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployed-contracts-testnet
          path: deployment-artifacts/
          retention-days: 30

  update-registry:
    name: Update Contract Registry
    runs-on: ubuntu-latest
    needs: [detect-changed, deploy-testnet]
    if: needs.detect-changed.outputs.contracts != '[]' && success()

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download deployment artifacts
        uses: actions/download-artifact@v4
        with:
          name: deployed-contracts-testnet
          path: deployment-artifacts

      - name: Update deployed-contracts.json
        run: |
          for file in deployment-artifacts/*.txt; do
            if [ -f "$file" ]; then
              CONTRACT_NAME=$(basename "$file" | sed 's/-testnet.txt//')
              CONTRACT_ID=$(cat "$file")
              jq ".\"testnet\".\"$CONTRACT_NAME\" = \"$CONTRACT_ID\"" scripts/deployed-contracts.json > scripts/deployed-contracts.json.tmp
              mv scripts/deployed-contracts.json.tmp scripts/deployed-contracts.json
            fi
          done

      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet scripts/deployed-contracts.json; then
            echo "No changes to deployed-contracts.json"
          else
            git add scripts/deployed-contracts.json
            git commit -m "chore: update deployed contract IDs for testnet"
            git push
          fi

  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [detect-changed, deploy-testnet]
    if: failure() && needs.detect-changed.outputs.contracts != '[]'

    steps:
      - name: Create issue for failed deployment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Contract Testnet Deployment Failed',
              body: `Automated testnet deployment workflow failed.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['bug', 'deployment', 'contracts']
            });
