route:
  receiver: 'default'
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - receiver: 'critical'
      match:
        severity: critical
      repeat_interval: 1h
    - receiver: 'warning'
      match:
        severity: warning
    - receiver: 'info'
      match:
        severity: info

receivers:
  - name: 'default'
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/PLACEHOLDER'
        channel: '#deployments'
        send_resolved: true
        title: '{{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
            *Alert:* {{ .Annotations.summary }}
            *Description:* {{ .Annotations.description }}
            *Severity:* {{ .Labels.severity }}
            *Instance:* {{ .Labels.instance }}
          {{ end }}

  - name: 'critical'
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/PLACEHOLDER'
        channel: '#incidents'
        send_resolved: true
        title: '🚨 CRITICAL: {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
            *Alert:* {{ .Annotations.summary }}
            *Description:* {{ .Annotations.description }}
            *Instance:* {{ .Labels.instance }}
            *Time:* {{ .StartsAt }}
          {{ end }}

  - name: 'warning'
    slack_configs: []

  - name: 'info'
    slack_configs: []

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['alertname']
