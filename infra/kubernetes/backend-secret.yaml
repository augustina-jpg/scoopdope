apiVersion: v1
kind: Secret
metadata:
  name: scoopdope-backend-secrets
  namespace: default
  labels:
    app: scoopdope-backend
type: Opaque
stringData:
  # Database credentials - Replace with actual values
  DATABASE_HOST: "postgres.default.svc.cluster.local"
  DATABASE_PORT: "5432"
  DATABASE_USER: "scoopdope"
  DATABASE_PASSWORD: "REPLACE_WITH_ACTUAL_PASSWORD"
  DATABASE_NAME: "scoopdope"

  # Authentication
  JWT_SECRET: "REPLACE_WITH_ACTUAL_SECRET"

  # Redis
  REDIS_URL: "redis://redis.default.svc.cluster.local:6379"

  # Stellar Configuration
  STELLAR_NETWORK: "testnet"
  STELLAR_SECRET_KEY: "REPLACE_WITH_ACTUAL_KEY"
  STELLAR_HORIZON_URL: "https://horizon-testnet.stellar.org"
  SOROBAN_RPC_URL: "https://soroban-testnet.stellar.org"
  STELLAR_WEB_AUTH_DOMAIN: "example.com"

  # Google OAuth
  GOOGLE_CLIENT_ID: "REPLACE_WITH_ACTUAL_CLIENT_ID"
  GOOGLE_CLIENT_SECRET: "REPLACE_WITH_ACTUAL_SECRET"
  GOOGLE_CALLBACK_URL: "https://api.example.com/auth/google/callback"

  # Frontend URL
  FRONTEND_URL: "https://example.com"
  CORS_ORIGINS: "https://example.com,https://www.example.com"

  # Email Configuration
  EMAIL_ENABLED: "false"
  EMAIL_HOST: "smtp.example.com"
  EMAIL_PORT: "587"
  EMAIL_SECURE: "false"
  EMAIL_USER: "REPLACE_WITH_ACTUAL_EMAIL"
  EMAIL_PASS: "REPLACE_WITH_ACTUAL_PASSWORD"
  EMAIL_FROM: "Scoopdope <no-reply@example.com>"

  # Elasticsearch
  ELASTICSEARCH_API_KEY: "REPLACE_WITH_ACTUAL_KEY"

  # AWS Credentials
  AWS_ACCESS_KEY_ID: "REPLACE_WITH_ACTUAL_KEY"
  AWS_SECRET_ACCESS_KEY: "REPLACE_WITH_ACTUAL_SECRET"

  # Stripe (optional)
  STRIPE_SECRET_KEY: "REPLACE_WITH_ACTUAL_KEY"
  STRIPE_WEBHOOK_SECRET: "REPLACE_WITH_ACTUAL_SECRET"

  # Sentry (optional)
  SENTRY_DSN: ""

  # KYC Provider (optional)
  KYC_PROVIDER_API_KEY: ""

  # Exchange Rate API (optional)
  EXCHANGE_RATE_API_KEY: ""
